<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Administrador</title>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  padding: 20px;
}

/* estilo planilha */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: left;
}

th {
  background: #f0f0f0;
}

input {
  padding: 6px;
  margin: 5px 0;
}

button {
  padding: 6px 12px;
  margin-top: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>

<hr>

<h3>Cadastro de Ministro</h3>
<input id="ministro" placeholder="Nome do Ministro">
<button onclick="addMinistro()">Salvar</button>

<table>
<thead>
<tr>
<th>Nome</th>
</tr>
</thead>
<tbody id="listaMinistros"></tbody>
</table>

<hr>

<h3>Nova Escala</h3>

<input type="date" id="data">
<input type="text" id="missa" placeholder="Horário (Ex: 19:30)">

<h4>Selecionar Ministros</h4>
<div id="checkboxMinistros"></div>

<button onclick="salvarEscala()">Salvar Escala</button>

<hr>

<h3>Escalas</h3>

<table>
<thead>
<tr>
<th>Data</th>
<th>Horário</th>
<th>Ministros</th>
</tr>
</thead>
<tbody id="escalas"></tbody>
</table>

<script type="module" src="admin.js"></script>

</body>
</html>
