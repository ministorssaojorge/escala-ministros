<!DOCTYPE html>
<html>
<body>

<h1>📋 PARÓQUIA SANTÍSSIMA TRINHDADE</h1>
<h1>📋 Escala Fixa Ministros Extraordinários da Distribuição da Sagrada Comunhão</h1>
  
<div id="escalas"></div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function carregarEscalas() {
  const div = document.getElementById("escalas");
  div.innerHTML = "";

  const snapshot = await getDocs(collection(db, "escalas"));

  snapshot.forEach(doc => {
    const e = doc.data();

    div.innerHTML += `
      <div>
        <h3>${e.data} - ${e.missa}</h3>
        ${e.ministros.join("<br>")}
      </div><hr>
    `;
  });
}

carregarEscalas();

</script>

</body>
</html>
